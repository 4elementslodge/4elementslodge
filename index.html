<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4 Elements Lodge | Queenstown, Komani</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #1A2226;
            --accent: #C5A880;
            --light-bg: #F9F8F6;
            --text-dark: #2C3539;
            --text-light: #FFFFFF;
            --font-serif: 'Cormorant Garamond', Georgia, serif;
            --font-sans: 'Montserrat', sans-serif;
            --transition: all 0.3s ease;
        }

        /* Simplified critical CSS for speed */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); color: var(--text-dark); background-color: var(--text-light); line-height: 1.6; }
        
        /* Optimized Hero - Ensure this loads instantly */
        .hero {
            height: 80vh; /* Slightly smaller on mobile for faster visual stability */
            background: linear-gradient(rgba(26, 34, 38, 0.65), rgba(26, 34, 38, 0.55)), 
                        url('https://i.ibb.co/9k7J8hGG/sunsetofthebnb.avif') center/cover no-repeat;
            display: flex; align-items: center; justify-content: center; text-align: center; color: var(--text-light);
        }

        .hero-logo { max-width: 150px; height: auto; margin-bottom: 20px; display: block; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        /* Fix for images to ensure they don't cause layout shifts */
        img { max-width: 100%; height: auto; display: block; }

        /* ... [Keep all other CSS from previous version below here] ... */
        .nav-btn { display: inline-block; padding: 10px 20px; background: var(--accent); color: var(--primary); text-decoration: none; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
        header { padding: 15px 0; background: rgba(26, 34, 38, 0.95); position: sticky; top: 0; z-index: 1000; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .showcase-row { display: flex; flex-direction: column; gap: 30px; margin-bottom: 50px; }
        @media (min-width: 768px) { .showcase-row { flex-direction: row; align-items: center; } }
    </style>
</head>
<body>

    <header>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="#" style="color:white; font-family:var(--font-serif); font-size: 1.5rem; text-decoration:none;">4 Elements Lodge</a>
            <a href="#enquire" class="nav-btn">Contact Us</a>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <!-- CRITICAL: High priority image -->
            <img src="https://i.ibb.co/Lh2W123/your-uploaded-logo.jpg" alt="Logo" class="hero-logo" fetchpriority="high">
            <h1>4 Elements Lodge</h1>
        </div>
    </section>

    <section class="about" style="padding: 50px 0;">
        <div class="container">
            <div class="showcase-row">
                <img src="https://i.ibb.co/prhBkx6T/roomwithpool.avif" alt="Pool" loading="lazy" decoding="async">
                <div>
                    <h2>A Pristine Escape</h2>
                    <p>Designed for comfort and privacy.</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Gallery Section -->
    <section class="gallery-section">
        <div class="container">
            <div class="gallery-grid">
                <img src="https://i.ibb.co/tT2zjzM5/room1.avif" alt="Room 1" loading="lazy" decoding="async">
                <img src="https://i.ibb.co/p6G7yZCT/ROOM2.avif" alt="Room 2" loading="lazy" decoding="async">
                <img src="https://i.ibb.co/hJtnLmHJ/room3.avif" alt="Room 3" loading="lazy" decoding="async">
                <img src="https://i.ibb.co/NdbGtXGW/room6.avif" alt="Room 6" loading="lazy" decoding="async">
            </div>
        </div>
    </section>

    <script>
        // Form handling remains the same
    </script>
</body>
</html>
